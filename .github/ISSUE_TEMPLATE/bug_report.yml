name: Bug Report
description: Report a bug in Sentinel ORM
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the ORM is affected?
      options:
        - Core (Model trait, QueryBuilder, types)
        - Macros (derive(Model), derive(Partial))
        - Migrations (schema diff, SQL generation)
        - CLI (sentinel command)
        - Driver Integration (connection, pool, execution)
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - "High \u2014 crash, data loss, or security issue"
        - "Medium \u2014 incorrect behavior with workaround"
        - "Low \u2014 minor or cosmetic issue"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        1. Define model with...
        2. Build query...
        3. Observe error...
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      placeholder: "e.g., 1.85.0"
  - type: input
    id: pg-version
    attributes:
      label: PostgreSQL Version
      placeholder: "e.g., 16.2"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Ubuntu 24.04, macOS 15"
