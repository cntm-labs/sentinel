[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # rustls-pemfile unmaintained — transitive dep from sentinel-driver v1.0.0,
    # will be resolved when driver drops it upstream.
    "RUSTSEC-2025-0134",
    # number_prefix unmaintained — pulled in by indicatif (sntl-cli progress
    # bars). The recommended replacement (unit-prefix) is not yet adopted by
    # indicatif upstream.
    "RUSTSEC-2025-0119",
]

[licenses]
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    # Apache 2.0 + the LLVM exception used by ar_archive_writer (transitive
    # build-time dep via stacker/recursive in sqlparser). Same permissive
    # terms as plain Apache-2.0 with an explicit patent grant carve-out.
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "BSL-1.0",
    "0BSD",
    "Zlib",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "simplest-path"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
